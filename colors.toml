# Vantablack Tinted — Vantablack with subtle steel-blue / brick-red / amber accents.
# Background stays pure black, foreground stays near-white. Tints surface only in
# ANSI colored output (errors, warnings, info), borders, and btop gradients.

# UI Colors (extended)
accent = "#7a8da8"
cursor = "#ffffff"

# Primary colors
foreground = "#f0f2f5"
background = "#000000"

# Selection colors
selection_foreground = "#000000"
selection_background = "#c8d2e0"

# Normal colors (ANSI 0-7)
color0 = "#404040"
color1 = "#c47878"
color2 = "#a8b0a8"
color3 = "#d6a06b"
color4 = "#7a95c2"
color5 = "#9b9b9b"
color6 = "#a4b8c4"
color7 = "#ececec"

# Bright colors (ANSI 8-15)
color8 = "#5c5c5c"
color9 = "#dc8a8a"
color10 = "#b6c0b6"
color11 = "#e8b87a"
color12 = "#9bb0d4"
color13 = "#b0b0b0"
color14 = "#c0d0dc"
color15 = "#ffffff"
